{% extends 'core/base.html' %}

{% block content %}
<h1>Blogs</h1>

{% if posts %}
    {% for post in posts %}
        <div>
            <h2>{{ post.titulo }}</h2>
            <p>{{ post.subtitulo }}</p>
            <a href="{% url 'page_detail' post.pk %}">Leer más</a>
        </div>
        <hr>
    {% endfor %}
{% else %}
    <p>No hay páginas aún.</p>
{% endif %}

<a href="{% url 'page_create' %}">Crear nuevo blog</a>

{% endblock %}
